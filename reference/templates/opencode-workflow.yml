# =============================================================================
# OpenCode GitHub Actions 工作流模板
# 来源：ai-engineering/reference/templates/opencode-workflow.yml
#
# 通道隔离设计：
#   对话通道（comment / review_comment）：
#     只读权限，用于分析、讨论、回复，不修改代码
#   代码通道（triage / review_pr）：
#     读写权限，用于分类、审查、创建分支/PR
#
# 使用方式：
#   1. 将此文件复制到目标项目的 .github/workflows/opencode.yml
#   2. 在 GitHub 仓库 Settings → Secrets and variables → Actions 中添加：
#      - LLM_API_KEY：你的 AI 模型 API Key（如 Anthropic、DeepSeek 等）
#   3. 修改下方 model 配置为你使用的模型（默认 deepseek/deepseek-v4-flash）
#   4. 提交推送后即可在 Issue/PR 中使用 /oc 或 /opencode 触发
#
# 事件说明：
#   - issue_comment：在 Issue/PR 评论中提及 /oc 触发（对话通道）
#   - pull_request_review_comment：在 PR 代码行评论中提及 /oc 触发（对话通道）
#   - issues：新 Issue 创建时自动 triage（代码通道）
#   - pull_request：新 PR 创建时自动 review（代码通道）
#
# 权限说明：
#   - comment / review_comment：仅仓库 OWNER 和 COLLABORATOR 可触发
#   - triage / review_pr：事件自动触发，无需人工调用
# =============================================================================

name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # ── 对话通道：通过 Issue/PR 评论触发，仅分析回复，不改代码 ──
  comment:
    if: |
      github.event_name == 'issue_comment' &&
      (contains(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, '/opencode')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          # 【必需】替换为你的 API Key Secret 名
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
        with:
          # 【必需】替换为你的模型，格式：provider/model
          model: deepseek/deepseek-v4-flash

  # ── 对话通道：PR 行级评论触发，仅分析回复，不改代码 ──
  review_comment:
    if: |
      github.event_name == 'pull_request_review_comment' &&
      (contains(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, '/opencode')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
        with:
          model: deepseek/deepseek-v4-flash

  # ── 代码通道：Issue 创建时自动 triage ──
  triage:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
             请用简体中文回复。对新创建的 Issue 执行以下操作：
             1. 分析 Issue 内容，回复分析结果并添加合适标签（bug/enhancement/question）
             2. 如果信息不足，追问更多上下文
             3. 如果 Issue 是明确的 Bug 报告或功能需求，在回复末尾询问：
                "是否需要我实施修复？如需修复请回复 `/oc 实施修复` 来确认"
             在用户确认之前，不得创建任何分支或 PR。

  # ── PR 创建时自动 review ──
  review_pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
             当有新 PR 创建时自动进行代码审查：

             【上下文注入】
             - 获取 PR 的标题、描述和完整 diff
             - 读取变更文件的内容

             【审查要求】
             - 检查代码质量、架构一致性、命名规范、文档完整性
             - 如果发现 bug 或安全隐患，在 PR 评论中明确指出
             - 提供具体的修改建议（文件路径 + 行号 + 建议代码）

             【权限约束】
             - 不得直接修改 PR 代码
             - 仅通过 PR review 评论反馈
