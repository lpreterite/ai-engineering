# skill-optimizer-ci.yml — contribution PR 自动审查
# 仅在有 `contribution` label 的 PR 上触发
# 对贡献的 skill 文件执行 7 维度审查，结果评论到 PR

name: Skill Contribution Review

on:
  pull_request:
    types: [opened, synchronize, labeled]
    paths:
      - 'skills/**'

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'contribution')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect contributed skill
        id: detect
        run: |
          SKILL_DIRS=$(git diff --name-only HEAD~1 -- skills/ 2>/dev/null || git diff --name-only origin/main...HEAD -- skills/)
          SKILL_NAME=$(echo "$SKILL_DIRS" | grep -E '^skills/([^/]+)/SKILL\.md$' | cut -d'/' -f2 | head -1)
          echo "skill=$SKILL_NAME" >> $GITHUB_OUTPUT
          echo "Detected skill: $SKILL_NAME"

      - name: Run validation
        id: validate
        if: steps.detect.outputs.skill != ''
        run: |
          SKILL_FILE="skills/${{ steps.detect.outputs.skill }}/SKILL.md"
          REPORT=""
          ERRORS=0

          # 维度 1: Description 覆盖度
          DESC=$(head -3 "$SKILL_FILE" | grep 'description:' | sed 's/.*: "//;s/"$//' || echo "")
          if echo "$DESC" | grep -cE '触发.*:.*、.*、.*、.*、' > /dev/null 2>&1; then
            REPORT="$REPORT| 1 | Description | ✅ | |"
          else
            REPORT="$REPORT| 1 | Description | ❌ | 不足 5 种触发词 |"
            ERRORS=$((ERRORS+1))
          fi

          # 维度 2: 长度
          LINES=$(wc -l < "$SKILL_FILE")
          if [ "$LINES" -le 80 ]; then
            REPORT="$REPORT| 2 | 长度 | ✅ | $LINES 行 |"
          else
            REPORT="$REPORT| 2 | 长度 | ❌ | $LINES 行（超 80） |"
            ERRORS=$((ERRORS+1))
          fi

          # 维度 3: 渐进式披露
          LOAD_REFS=$(grep -c "此时加载" "$SKILL_FILE" || true)
          if [ "$LOAD_REFS" -ge 1 ]; then
            REPORT="$REPORT| 3 | 渐进式披露 | ✅ | $LOAD_REFS 处加载标注 |"
          else
            REPORT="$REPORT| 3 | 渐进式披露 | ❌ | 无「此时加载」标注 |"
            ERRORS=$((ERRORS+1))
          fi

          # 维度 4: 自由度分层
          FREEDOM=$(grep -c '\[自由度' "$SKILL_FILE" || true)
          if [ "$FREEDOM" -ge 1 ]; then
            REPORT="$REPORT| 4 | 自由度分层 | ✅ | $FREEDOM 处标注 |"
          else
            REPORT="$REPORT| 4 | 自由度分层 | ❌ | 无自由度标注 |"
            ERRORS=$((ERRORS+1))
          fi

          # 维度 5: 前置/后置条件
          if grep -q "前置条件" "$SKILL_FILE" && grep -q "完成标准" "$SKILL_FILE"; then
            REPORT="$REPORT| 5 | 前置/后置 | ✅ | 前置条件 + 完成标准 |"
          else
            REPORT="$REPORT| 5 | 前置/后置 | ❌ | 缺少前置条件或完成标准 |"
            ERRORS=$((ERRORS+1))
          fi

          # 维度 6: 回退路径
          if grep -q "回退路径" "$SKILL_FILE"; then
            REPORT="$REPORT| 6 | 回退路径 | ✅ | 有回退路径 |"
          else
            REPORT="$REPORT| 6 | 回退路径 | ❌ | 无回退路径 |"
            ERRORS=$((ERRORS+1))
          fi

          # 维度 7: 反模式检查
          if [ ! -f "skills/${{ steps.detect.outputs.skill }}/README.md" ]; then
            REPORT="$REPORT| 7 | 反模式 | ✅ | 无冗余文件 |"
          else
            REPORT="$REPORT| 7 | 反模式 | ❌ | 含 README.md 等冗余文件 |"
            ERRORS=$((ERRORS+1))
          fi

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT

      - name: Post review comment
        if: steps.detect.outputs.skill != ''
        uses: actions/github-script@v7
        with:
          script: |
            const skill = '${{ steps.detect.outputs.skill }}';
            const errors = ${{ steps.validate.outputs.errors }};
            const report = `${{ steps.validate.outputs.report }}`;

            let body = `## Skill 审查结果: ${skill}\n\n`;
            body += `| # | 维度 | 判定 | 详情 |\n`;
            body += `|---|------|------|------|\n`;
            body += report.replace(/\| /g, '| ');

            if (errors > 0) {
              body += `\n\n**❌ 发现 ${errors} 个问题，请修复后重新提交。**`;
            } else {
              body += `\n\n**🎉 全部通过！等待人工确认后合并。**`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
