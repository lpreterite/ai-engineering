name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # 通过 Issue/PR 评论触发（仅 OWNER / COLLABORATOR）
  comment:
    if: |
      github.event_name == 'issue_comment' &&
      (contains(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, '/opencode')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
             默认行为：先分析 Issue/PR 内容并回复说明。如果用户明确要求修复、修改或变更，则执行以下流程：
             1. 使用 `gh pr list --search "<issue_number>" --json headRefName,number` 检查该 Issue 是否已有分支/PR
             2. 如果已有关联分支，checkout 到该分支完成修改，已有的 PR 会自动更新
             3. 如果没有关联分支，创建新分支和 PR

  # PR review 评论触发（代码行级，仅 OWNER / COLLABORATOR）
  review_comment:
    if: |
      github.event_name == 'pull_request_review_comment' &&
      (contains(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, '/opencode')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true

  # Issue 创建时自动 triage
  triage:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          model: deepseek/deepseek-v4-flash
          prompt: |
             请用简体中文回复。对新创建的 Issue 执行以下操作：
             1. 分析 Issue 内容，回复分析结果并添加合适标签（bug/enhancement/question）
             2. 如果信息不足，追问更多上下文
             3. 如果 Issue 是明确的 Bug 报告或功能需求，在回复末尾询问：
                "是否需要我实施修复？如需修复请回复 `/oc 实施修复` 来确认"
             在用户确认之前，不得创建任何分支或 PR。

  # PR 创建时自动 review
  review_pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: 请用简体中文进行代码审查。
