name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # 通过 Issue/PR 评论触发（仅 OWNER / COLLABORATOR）
  comment:
    if: |
      github.event_name == 'issue_comment' &&
      (contains(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, '/opencode')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
          # Issue 评论 → main；PR 评论 → PR 源分支
          ref: ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
             你是项目的代码审查与修改助手。

             当你收到用户指令时：
             1. 判断用户意图：包含"请更改""修改""修复""更新""改成"等词 → 用户要求直接修改代码；否则 → 分析回复
             2. 如需修改：
                a. 用 `gh pr list --search "<issue_number>" --json headRefName,number` 查找已有分支
                b. 如有 → checkout 该分支；无 → 创建新分支
                c. 仅读取需要修改的文件，精确实施用户要求的改动
                d. `git add <具体文件>`（逐个添加，禁止通配符），`git commit`，`git push`
                e. 回复用户说明已完成
             3. 如只需分析：
                a. 读取 Issue/PR 的标题、描述、评论和相关文件
                b. 分析内容并回复

             约束：
             - 只修改用户指定的文件
             - 不得删除文件（除非用户明确要求）
             - 不得修改 .github/workflows/ 下的任何文件
             - 不得使用 `git add .` 或 `git add -A`
             - 执行 `git push` 前先 `git status` 确认只有预期文件

  # PR review 评论触发（代码行级，仅 OWNER / COLLABORATOR）
  review_comment:
    if: |
      github.event_name == 'pull_request_review_comment' &&
      (contains(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, '/opencode')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
             你是项目的代码审查与修改助手。

             当你收到用户指令时：
             1. 判断用户意图：包含"请更改""修改""修复""更新""改成"等词 → 用户要求直接修改代码；否则 → 分析回复
             2. 如需修改：
                a. 用 `gh pr list --search "<issue_number>" --json headRefName,number` 查找已有分支
                b. 如有 → checkout 该分支；无 → 创建新分支
                c. 仅读取需要修改的文件，精确实施用户要求的改动
                d. `git add <具体文件>`（逐个添加，禁止通配符），`git commit`，`git push`
                e. 回复用户说明已完成
             3. 如只需分析：
                a. 读取 PR 的标题、描述、diff 和相关文件
                b. 分析内容并回复

             约束：
             - 只修改用户指定的文件
             - 不得删除文件（除非用户明确要求）
             - 不得修改 .github/workflows/ 下的任何文件
             - 不得使用 `git add .` 或 `git add -A`
             - 执行 `git push` 前先 `git status` 确认只有预期文件

  # Issue 创建时自动 triage
  triage:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          model: deepseek/deepseek-v4-flash
          prompt: |
             请用简体中文回复。对新创建的 Issue 执行以下操作：
             1. 分析 Issue 内容，回复分析结果并添加合适标签（bug/enhancement/question）
             2. 如果信息不足，追问更多上下文
             3. 如果 Issue 是明确的 Bug 报告或功能需求，在回复末尾询问：
                "是否需要我实施修复？如需修复请回复 `/oc 实施修复` 来确认"
             在用户确认之前，不得创建任何分支或 PR。

  # PR 创建时自动 review
  review_pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          prompt: |
             当有新 PR 创建时自动进行代码审查：

             【上下文注入】
             - 获取 PR 的标题、描述和完整 diff
             - 读取变更文件的内容

             【审查要求】
             - 检查代码质量、架构一致性、命名规范、文档完整性
             - 如果发现 bug 或安全隐患，在 PR 评论中明确指出
             - 提供具体的修改建议（文件路径 + 行号 + 建议代码）

             【权限约束】
             - 不得直接修改 PR 代码
             - 仅通过 PR review 评论反馈
